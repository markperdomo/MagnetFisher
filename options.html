<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MagnetFisher Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #12121f;
      border: 1px solid rgba(79, 195, 247, 0.15);
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      padding: 20px 24px 16px;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a1a2e 50%, #16213e 100%);
      border-bottom: 1px solid rgba(79, 195, 247, 0.15);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header .subtitle {
      font-size: 11px;
      color: #607d8b;
      margin-top: 2px;
    }

    .body { padding: 20px 24px 24px; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #90a4ae;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    label .hint { font-weight: 400; color: #546e7a; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #0d0d1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #4fc3f7;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .checkbox-field input { width: 16px; height: 16px; accent-color: #4fc3f7; }
    .checkbox-field label { margin: 0; cursor: pointer; }

    .actions { display: flex; gap: 10px; }

    button {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    #saveBtn {
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
    }
    #saveBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79, 195, 247, 0.4); }

    #testBtn {
      background: #1a2332;
      color: #90a4ae;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    #testBtn:hover { color: #e0e0e0; border-color: rgba(79, 195, 247, 0.3); }

    button:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

    #status {
      margin-top: 16px;
      font-size: 12px;
      min-height: 18px;
      color: #607d8b;
    }
    #status.success { color: #66bb6a; }
    #status.error { color: #ef5350; }
    #status.working { color: #4fc3f7; }

    .note {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 11px;
      color: #546e7a;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>MagnetFisher Settings</h1>
      <div class="subtitle">Connect to your qBittorrent WebUI</div>
    </div>
    <div class="body">
      <div class="field">
        <label for="baseUrl">Host URL <span class="hint">— e.g. http://192.168.1.10:8080</span></label>
        <input type="text" id="baseUrl" placeholder="http://localhost:8080" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="username">WebUI Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="password">WebUI Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="field">
        <label for="savepath">Save Folder <span class="hint">— optional, absolute path on the qBittorrent host</span></label>
        <input type="text" id="savepath" placeholder="/downloads/movies" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="category">Category <span class="hint">— optional</span></label>
        <input type="text" id="category" placeholder="" autocomplete="off" spellcheck="false">
      </div>
      <div class="checkbox-field">
        <input type="checkbox" id="startImmediately">
        <label for="startImmediately">Start downloading immediately</label>
      </div>
      <div class="actions">
        <button id="saveBtn">Save</button>
        <button id="testBtn">Test connection</button>
      </div>
      <div id="status"></div>
      <div class="note">
        qBittorrent has no API key — it uses your WebUI username and password. Credentials
        are stored locally on this device only (not synced). "CSRF protection" can stay
        enabled in qBittorrent; the extension handles the required headers itself.
      </div>
    </div>
  </div>
  <script src="qbit.js"></script>
  <script src="options.js"></script>
</body>
</html>
