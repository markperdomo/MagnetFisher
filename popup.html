<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes scanLine {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px rgba(79, 195, 247, 0.3); }
      50% { box-shadow: 0 0 20px rgba(79, 195, 247, 0.6); }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
    }

    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a1a2e 50%, #16213e 100%);
      border-bottom: 1px solid rgba(79, 195, 247, 0.15);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4fc3f7, transparent);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(79, 195, 247, 0.3);
    }

    .title-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .title-text .subtitle {
      font-size: 11px;
      color: #607d8b;
      margin-top: 1px;
    }

    .body {
      padding: 16px 20px 20px;
    }

    #grabBtn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    #grabBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79, 195, 247, 0.4);
    }

    #grabBtn:active { transform: translateY(0); }

    #grabBtn:disabled {
      background: #1a2332;
      color: #4a5568;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .scanning #grabBtn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #fff;
      animation: scanLine 1.5s ease-in-out infinite;
    }

    #status {
      margin-top: 14px;
      font-size: 12px;
      color: #607d8b;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status:empty { display: none; }

    #status.scanning {
      color: #4fc3f7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #status.success { color: #66bb6a; }
    #status.error { color: #ef5350; }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(102, 187, 106, 0.15);
      color: #66bb6a;
      font-weight: 700;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(102, 187, 106, 0.3);
    }

    #results {
      margin-top: 12px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a3a4a #0d0d1a;
    }

    #results:empty { display: none; }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .magnet-item {
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.2s ease-out both;
    }

    .magnet-item:hover {
      background: rgba(79, 195, 247, 0.05);
      border-color: rgba(79, 195, 247, 0.15);
    }

    .magnet-icon {
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      background: #4fc3f7;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(79, 195, 247, 0.5);
    }

    .magnet-name {
      font-size: 12px;
      color: #b0bec5;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #4a5568;
      font-size: 12px;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="title-row">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 17V20C3 20.55 3.45 21 4 21H7V17H3Z" fill="#ef5350"/>
          <path d="M17 17V21H20C20.55 21 21 20.55 21 20V17H17Z" fill="#ef5350"/>
          <path d="M3 7V17H7V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V17H21V7C21 3.13 17.87 0 14 0H10C6.13 0 3 3.13 3 7Z" fill="#fff"/>
        </svg>
      </div>
      <div class="title-text">
        <h1>MagnetFisher</h1>
        <div class="subtitle">Magnet link collector for qBittorrent</div>
      </div>
    </div>
  </div>
  <div class="body">
    <button id="grabBtn">Grab All Magnet Links</button>
    <div id="status"></div>
    <div id="results"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
