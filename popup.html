<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes scanLine {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px rgba(79, 195, 247, 0.3); }
      50% { box-shadow: 0 0 20px rgba(79, 195, 247, 0.6); }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
    }

    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a1a2e 50%, #16213e 100%);
      border-bottom: 1px solid rgba(79, 195, 247, 0.15);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #4fc3f7, transparent);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(79, 195, 247, 0.3);
    }

    .title-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .title-text .subtitle {
      font-size: 11px;
      color: #607d8b;
      margin-top: 1px;
    }

    .title-row .spacer { flex: 1; }

    #settingsBtn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: #607d8b;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.2s, background 0.2s;
    }

    #settingsBtn:hover { color: #4fc3f7; background: rgba(79, 195, 247, 0.08); }

    .body {
      padding: 16px 20px 20px;
    }

    #grabBtn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    #grabBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79, 195, 247, 0.4);
    }

    #grabBtn:active { transform: translateY(0); }

    #grabBtn:disabled {
      background: #1a2332;
      color: #4a5568;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    #sendBtn, #pasteBtn {
      width: 100%;
      margin-top: 10px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #66bb6a, #2e7d32);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #sendBtn:hover, #pasteBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(102, 187, 106, 0.4);
    }

    #sendBtn:active, #pasteBtn:active { transform: translateY(0); }

    #sendBtn[hidden] { display: none; }

    #sendBtn:disabled, #pasteBtn:disabled {
      background: #1a2332;
      color: #4a5568;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 12px;
      color: #455a64;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    #pasteBox {
      width: 100%;
      min-height: 72px;
      max-height: 160px;
      resize: vertical;
      padding: 10px 12px;
      background: #0d0d1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.4;
      transition: border-color 0.2s, background 0.2s;
    }

    #pasteBox:focus { outline: none; border-color: #4fc3f7; }

    #pasteBox::placeholder { color: #455a64; }

    #pasteBox.dragover {
      border-color: #4fc3f7;
      border-style: dashed;
      background: rgba(79, 195, 247, 0.06);
    }

    .paste-info {
      margin-top: 6px;
      font-size: 11px;
      color: #607d8b;
      min-height: 14px;
    }

    .paste-info:empty { display: none; }

    #pasteStatus {
      margin-top: 10px;
      font-size: 12px;
      color: #607d8b;
      min-height: 16px;
    }

    #pasteStatus:empty { display: none; }
    #pasteStatus.scanning { color: #4fc3f7; animation: pulse 1.5s ease-in-out infinite; }
    #pasteStatus.success { color: #66bb6a; }
    #pasteStatus.error { color: #ef5350; }

    .scanning #grabBtn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #fff;
      animation: scanLine 1.5s ease-in-out infinite;
    }

    #status {
      margin-top: 14px;
      font-size: 12px;
      color: #607d8b;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status:empty { display: none; }

    #status.scanning {
      color: #4fc3f7;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #status.success { color: #66bb6a; }
    #status.error { color: #ef5350; }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(102, 187, 106, 0.15);
      color: #66bb6a;
      font-weight: 700;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid rgba(102, 187, 106, 0.3);
    }

    #results {
      margin-top: 12px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2a3a4a #0d0d1a;
    }

    #results:empty { display: none; }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

    .magnet-item {
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.2s ease-out both;
    }

    .magnet-item:hover {
      background: rgba(79, 195, 247, 0.05);
      border-color: rgba(79, 195, 247, 0.15);
    }

    .magnet-icon {
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      background: #4fc3f7;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(79, 195, 247, 0.5);
    }

    .magnet-name {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: #b0bec5;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .item-send {
      flex-shrink: 0;
      background: rgba(102, 187, 106, 0.12);
      border: 1px solid rgba(102, 187, 106, 0.3);
      color: #66bb6a;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .item-send:hover { background: rgba(102, 187, 106, 0.22); }

    .item-send:disabled {
      cursor: default;
      opacity: 0.7;
    }

    .item-send.sent {
      background: rgba(102, 187, 106, 0.2);
      color: #66bb6a;
      border-color: rgba(102, 187, 106, 0.4);
    }

    .item-send.failed {
      background: rgba(239, 83, 80, 0.12);
      color: #ef5350;
      border-color: rgba(239, 83, 80, 0.3);
    }

    .config-hint {
      margin-top: 12px;
      padding: 12px;
      background: rgba(79, 195, 247, 0.06);
      border: 1px solid rgba(79, 195, 247, 0.15);
      border-radius: 8px;
      font-size: 12px;
      color: #90a4ae;
      line-height: 1.4;
    }

    .config-hint a {
      color: #4fc3f7;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .config-hint a:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #4a5568;
      font-size: 12px;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="title-row">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 17V20C3 20.55 3.45 21 4 21H7V17H3Z" fill="#ef5350"/>
          <path d="M17 17V21H20C20.55 21 21 20.55 21 20V17H17Z" fill="#ef5350"/>
          <path d="M3 7V17H7V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V17H21V7C21 3.13 17.87 0 14 0H10C6.13 0 3 3.13 3 7Z" fill="#fff"/>
        </svg>
      </div>
      <div class="title-text">
        <h1>MagnetFisher</h1>
        <div class="subtitle">Magnet link collector for qBittorrent</div>
      </div>
      <div class="spacer"></div>
      <button id="settingsBtn" title="qBittorrent settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="body">
    <button id="grabBtn">Grab All Magnet Links</button>
    <button id="sendBtn" hidden>Send all to qBittorrent</button>
    <div id="status"></div>
    <div id="results"></div>

    <div class="divider">or paste your own</div>
    <textarea id="pasteBox" spellcheck="false" placeholder="Paste magnet links (one per line), or drop a .txt file here"></textarea>
    <div id="pasteInfo" class="paste-info"></div>
    <button id="pasteBtn" disabled>Add pasted torrents</button>
    <div id="pasteStatus"></div>
  </div>
  <script src="qbit.js"></script>
  <script src="popup.js"></script>
</body>
</html>
